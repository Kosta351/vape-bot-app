<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bermuda Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #08090a; --card: #121316; --accent: #007aff; --text: #ffffff; --muted: #8e8e93; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; margin: 0; padding: 20px; padding-bottom: 120px; overflow-x: hidden; }
        
        /* Сетка товаров */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--card); border-radius: 24px; padding: 12px; border: 1px solid var(--glass); }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 18px; object-fit: cover; }
        .price { font-weight: 800; color: var(--accent); margin-top: 5px; }

        /* Плавающая корзина */
        .cart-bar { position: fixed; bottom: 30px; left: 20px; right: 20px; background: var(--accent); padding: 20px; border-radius: 20px; display: none; justify-content: space-between; font-weight: 800; z-index: 900; box-shadow: 0 10px 30px rgba(0,122,255,0.3); }

        /* Экран КОРЗИНЫ */
        .screen { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: var(--bg); z-index: 2000; transition: 0.3s; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .screen.active { left: 0; }
        .cart-item { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--glass); }
        
        /* Модалка выбора вкуса */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1000; }
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; background: #18181b; border-radius: 30px 30px 0 0; padding: 30px; box-sizing: border-box; transition: 0.4s ease; z-index: 1001; }
        .modal.active { bottom: 0; }
        .flavor-item { background: var(--glass); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .flavor-item.selected { border: 1px solid var(--accent); background: rgba(0,122,255,0.1); }

        .btn-pay { background: var(--accent); color: white; border: none; width: 100%; padding: 20px; border-radius: 20px; font-weight: 800; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- Главная -->
    <div id="home-view">
        <h1 style="font-weight: 800;">Bermuda</h1>
        <div class="grid" id="product-grid"></div>
    </div>

    <!-- Корзина -->
    <div class="screen" id="cart-screen">
        <div onclick="closeCart()" style="color: var(--accent); font-weight: 800; margin-bottom: 30px;">❮ НАЗАД</div>
        <h2 style="font-size: 28px; margin-bottom: 20px;">Моя корзина</h2>
        <div id="cart-items-list"></div>
        <div id="cart-total-info" style="margin-top: 20px; font-size: 20px; font-weight: 800; text-align: right;"></div>
        <button class="btn-pay" onclick="sendOrder()">ОФОРМИТЬ И ОПЛАТИТЬ</button>
    </div>

    <div class="cart-bar" id="cart-bar" onclick="openCart()">
        <span>КОРЗИНА: <span id="bar-count">0</span></span>
        <span id="bar-total">0 ₽ ❯</span>
    </div>

    <!-- Модалка вкуса -->
    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    <div class="modal" id="modal">
        <h2 id="m-name">Вкус</h2>
        <div id="m-flavors"></div>
        <button class="btn-pay" onclick="confirmAdd()">ДОБАВИТЬ В КОРЗИНУ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let products = [];
        let cart = [];
        let selectedProduct = null;

        // Загрузка товаров
        async function load() {
            try {
                const res = await fetch('http://localhost:8080/api/products');
                products = await res.json();
            } catch(e) {
                products = [{id:1, name:"ANARCHY V2", price:450, img:"https://via.placeholder.com/300", flavors:["Манго","Ананас"]}];
            }
            render();
        }

        function render() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="card" onclick="openModal(${p.id})">
                    <img src="${p.img}">
                    <div style="font-weight: 600; margin-top: 10px;">${p.name}</div>
                    <div class="price">${p.price} ₽</div>
                </div>
            `).join('');
        }

        function openModal(id) {
            selectedProduct = products.find(p => p.id === id);
            document.getElementById('m-name').innerText = selectedProduct.name;
            document.getElementById('m-flavors').innerHTML = selectedProduct.flavors.map((f, i) => `
                <div class="flavor-item ${i===0?'selected':''}" onclick="selectFlavor(this)"><span>${f}</span></div>
            `).join('');
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').classList.add('active');
        }

        function selectFlavor(el) {
            document.querySelectorAll('.flavor-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        }

        function confirmAdd() {
            const flavor = document.querySelector('.flavor-item.selected span').innerText;
            cart.push({ name: selectedProduct.name, price: selectedProduct.price, flavor: flavor });
            updateBar();
            closeModal();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function updateBar() {
            const bar = document.getElementById('cart-bar');
            bar.style.display = cart.length ? 'flex' : 'none';
            document.getElementById('bar-count').innerText = cart.length;
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('bar-total').innerText = total + ' ₽ ❯';
        }

        function openCart() {
            const list = document.getElementById('cart-items-list');
            list.innerHTML = cart.map((item, idx) => `
                <div class="cart-item">
                    <div>
                        <div style="font-weight: 800;">${item.name}</div>
                        <div style="color: var(--muted); font-size: 13px;">Вкус: ${item.flavor}</div>
                    </div>
                    <div style="font-weight: 800;">${item.price} ₽</div>
                </div>
            `).join('');
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total-info').innerText = 'Итого: ' + total + ' ₽';
            document.getElementById('cart-screen').classList.add('active');
        }

        function sendOrder() {
            if (cart.length === 0) return;
            // Отправляем данные боту
            tg.sendData(JSON.stringify(cart));
            tg.close(); // Закрываем приложение после заказа
        }

        function closeCart() { document.getElementById('cart-screen').classList.remove('active'); }
        function closeModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('modal').classList.remove('active'); }

        load();
    </script>
</body>
</html>
